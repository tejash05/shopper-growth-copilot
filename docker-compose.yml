services:
  postgres:
    image: postgres:16-alpine
    container_name: scp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scp
      POSTGRES_PASSWORD: scp
      POSTGRES_DB: shopper_growth_copilot
    ports:
      - "5432:5432"
    volumes:
      - scp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scp -d shopper_growth_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: scp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - scp_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scp_pgdata:
  scp_redisdata:
